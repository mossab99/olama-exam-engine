name: Deploy Olama Exam Engine Plugin

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy WordPress Plugin via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -euxo pipefail

            BASE_DIR="/home/olama/htdocs/olama.online/wp-content/plugins"
            PLUGIN_DIR="$BASE_DIR/olama-exam-engine"
            REPO_URL="https://github.com/mossab99/olama-exam-engine.git"

            if [ ! -d "$BASE_DIR" ]; then
              echo "ERROR: WordPress plugins directory not found"
              exit 1
            fi

            if [ ! -d "$PLUGIN_DIR" ]; then
              echo "Plugin not found. Cloning repository..."
              cd "$BASE_DIR"
              git clone "$REPO_URL"
            else
              echo "Plugin exists. Updating..."
              cd "$PLUGIN_DIR"
              git fetch origin
              git reset --hard origin/main
              git clean -fd
            fi

            chown -R www-data:www-data "$PLUGIN_DIR"
            find "$PLUGIN_DIR" -type d -exec chmod 755 {} \;
            find "$PLUGIN_DIR" -type f -exec chmod 644 {} \;
